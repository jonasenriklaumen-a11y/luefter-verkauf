<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaufen – Arctic P12 Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="contact-page">

  <nav id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">← Arctic P12 Pro</a>
    </div>
  </nav>

  <section class="contact-hero">
    <div class="contact-wrap">
      <div class="contact-left reveal">
        <p class="section-label">Bestellung</p>
        <h1>Dein neuer<br>Lieblingsventilator.</h1>
        <p class="contact-sub">Füll das Formular aus und wir melden uns innerhalb von 24 Stunden bei dir.</p>
        <div class="contact-fan-img">
          <img src="RUIDbddd6fde227db4df6a3f41e8fc6a81432.jpg" alt="Arctic P12 Pro" />
        </div>
      </div>
      <div class="contact-right reveal">
        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Max Mustermann" required />
          </div>
          <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" placeholder="max@beispiel.de" required />
          </div>
          <div class="form-group">
            <label for="color">Farbe</label>
            <select id="color" name="color">
              <option value="white">Weiß</option>
              <option value="black">Schwarz</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quantity">Anzahl</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10" value="1" />
          </div>
          <div class="form-group">
            <label for="message">Nachricht (optional)</label>
            <textarea id="message" name="message" rows="4" placeholder="Fragen, Wünsche…"></textarea>
          </div>
          <button type="submit" class="btn-primary btn-dark btn-full">Anfrage senden</button>
        </form>
        <div class="form-success" id="formSuccess">
          <div class="success-icon">✓</div>
          <h3>Anfrage erhalten!</h3>
          <p>Wir melden uns bald bei dir.</p>
          <a href="index.html" class="btn-primary" style="margin-top:2rem;display:inline-block;">Zurück zur Startseite</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Arctic P12 Pro Desk Fan. Alle Rechte vorbehalten.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
